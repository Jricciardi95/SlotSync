; SlotSync — ESP32 shelf LED controller (production-minded MVP)
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
  fastled/FastLED@^3.7.0
  bblanchon/ArduinoJson@^7.2.0

; VERBOSE_DEBUG=y enables extra Serial logging (see hardware_config.h)
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=0
  -std=gnu++17

; Optional: secrets without editing repo — copy include/wifi_credentials.example.h
; to include/wifi_credentials.h (see README). Uncomment if you use that file:
; build_flags = ${env.build_flags} -include wifi_credentials.h
